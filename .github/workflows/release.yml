name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - 'release-*'
      - 'staging-*'

permissions:
  contents: write
  packages: write

jobs:
  # ── Binary releases (v* tags only) ──────────────────────────────
  binaries:
    if: startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o blog-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o blog-linux-arm64 .
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o blog-darwin-amd64 .
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o blog-darwin-arm64 .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o blog-windows-amd64.exe .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: blog-*

  # ── Docker images (release-* and staging-* tags) ───────────────
  docker:
    if: startsWith(github.ref_name, 'release-') || startsWith(github.ref_name, 'staging-')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Compute image tags ─────────────────────────────────────
      - name: Compute Docker tags
        id: tags
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          TAG_NAME="${GITHUB_REF_NAME}"

          if [[ "${TAG_NAME}" == release-* ]]; then
            # release-v1.2.3 → version is v1.2.3
            VERSION="${TAG_NAME#release-}"
            echo "tags=${IMAGE}:${VERSION},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          elif [[ "${TAG_NAME}" == staging-* ]]; then
            # staging-v0.0.1 → staging-v0.0.1
            VERSION="${TAG_NAME#staging-}"
            echo "tags=${IMAGE}:staging-${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      # ── Docker build & push ────────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
